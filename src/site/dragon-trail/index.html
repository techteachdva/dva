<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Trail v5 - Web Edition</title>
    <link rel="stylesheet" href="css/crt.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="crt-wrapper">
        <div class="crt-monitor">
            <div class="crt-screen">
                <div class="scanlines"></div>
                <div class="screen-curve"></div>
                <div class="vignette"></div>
                <div class="flicker"></div>
                <div class="phosphor-overlay"></div>
                <div id="terminal" class="terminal">
                    <div id="terminal-output" class="terminal-output"></div>
                    <div id="terminal-input-line" class="terminal-input-line">
                        <span id="terminal-prompt" class="terminal-prompt">&gt;&gt;&gt;</span>
                        <input id="terminal-input" class="terminal-input" type="text" autocomplete="off" spellcheck="false">
                        <span id="terminal-cursor" class="terminal-cursor">_</span>
                    </div>
                </div>
                <div id="combat-overlay" class="combat-overlay hidden">
                    <div class="enemy-sprite" id="enemy-sprite"></div>
                    <div class="combat-effects" id="combat-effects"></div>
                </div>
                <div id="minigame-overlay" class="minigame-overlay hidden">
                    <canvas id="minigame-canvas"></canvas>
                </div>
            </div>
            <div class="monitor-bezel">
                <div class="monitor-brand">DRAGON TRAIL v5</div>
                <div class="monitor-power">
                    <div class="power-led"></div>
                    <span class="power-text">ON</span>
                </div>
            </div>
        </div>
        <div class="controls-panel">
            <button id="btn-fullscreen" class="control-btn" title="Toggle Fullscreen">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/>
                </svg>
            </button>
            <button id="btn-audio" class="control-btn" title="Toggle Audio">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/>
                    <path d="M10.121 12.596A6.48 6.48 0 0 0 12.025 8a6.48 6.48 0 0 0-1.904-4.596l-.707.707A5.483 5.483 0 0 1 11.025 8a5.483 5.483 0 0 1-1.61 3.89l.706.706z"/>
                    <path d="M8.707 11.182A4.486 4.486 0 0 0 10.025 8a4.486 4.486 0 0 0-1.318-3.182L8 5.525A3.489 3.489 0 0 1 9.025 8 3.49 3.49 0 0 1 8 10.475l.707.707zM6.717 3.55A.5.5 0 0 1 7 4v8a.5.5 0 0 1-.812.39L3.825 10.5H1.5A.5.5 0 0 1 1 10V6a.5.5 0 0 1 .5-.5h2.325l2.363-1.89a.5.5 0 0 1 .529-.06z"/>
                </svg>
            </button>
            <button id="btn-scanlines" class="control-btn active" title="Toggle Scanlines">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M0 1a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V1zm1 0v14h14V1H1z"/>
                    <path d="M0 3h16v1H0zm0 3h16v1H0zm0 3h16v1H0zm0 3h16v1H0z"/>
                </svg>
            </button>
            <div class="audio-visualizer" id="audio-visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- Audio elements for background music (optional files) -->
    <div id="audio-elements" style="display:none;">
        <audio id="music-main_menu" loop></audio>
        <audio id="music-travel" loop></audio>
        <audio id="music-hunt" loop></audio>
        <audio id="music-scout" loop></audio>
        <audio id="music-rest" loop></audio>
        <audio id="music-cook" loop></audio>
        <audio id="music-boss_fight" loop></audio>
        <audio id="music-gear_shop" loop></audio>
        <audio id="music-mini_boss_fight" loop></audio>
        <audio id="music-random_encounter" loop></audio>
    </div>

    <!-- Game modules -->
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/classes.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/combat.js"></script>
    <script src="js/resources.js"></script>
    <script src="js/travel.js"></script>
    <script src="js/minigames.js"></script>
    <script src="js/menus.js"></script>
    <script src="js/ascii_art_extra.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
