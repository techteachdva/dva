<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, viewport-fit=cover">
	<meta name="mobile-web-app-capable" content="yes">
	<title>Physix</title>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="physix.icon.png" />
	<link rel="apple-touch-icon" href="physix.apple-touch-icon.png" />
	<link rel="manifest" href="physix.manifest.json" />
	<script>(function(){if(typeof window==='undefined'||!window.AudioContext)return;window.__godotAudioContexts=[];var O=window.AudioContext||window.webkitAudioContext;function P(opts){var c=arguments.length?new O(opts):new O();window.__godotAudioContexts.push(c);return c}P.prototype=O.prototype;window.AudioContext=window.webkitAudioContext=P;window.__resumeAllAudioContexts=function(){var a=window.__godotAudioContexts||[];for(var i=0;i<a.length;i++)try{if(a[i]&&typeof a[i].resume==='function'&&a[i].state==='suspended')a[i].resume()}catch(e){}}})();</script>
	<style>
		body { margin: 0; background: #0a0a12; touch-action: manipulation; overflow: hidden; }
		#canvas { display: block; width: 100%; height: 100%; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
		#gd-loading { position: fixed; inset: 0; background: #242424; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: system-ui, -apple-system, sans-serif; }
		#gd-loading.hidden { display: none !important; }
		#gd-loading .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #7b9cff; border-radius: 50%; animation: gd-spin 0.9s linear infinite; }
		#gd-loading .text { color: #c8d4f0; font-size: 18px; margin-top: 20px; }
		#gd-loading .bar-wrap { width: 240px; height: 6px; background: rgba(255,255,255,0.15); border-radius: 3px; margin-top: 16px; overflow: hidden; }
		#gd-loading .bar { height: 100%; background: #7b9cff; width: 0%; transition: width 0.15s; }
		#gd-play-btn { margin-top: 20px; padding: 12px 32px; font-size: 18px; background: #7b9cff; color: #0a0a12; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; touch-action: manipulation; }
		@keyframes gd-spin { to { transform: rotate(360deg); } }
	</style>
</head>
<body>
	<div id="gd-loading">
		<div class="spinner"></div>
		<div class="text" id="gd-loading-text">Click to play</div>
		<div class="bar-wrap"><div class="bar" id="gd-progress-bar"></div></div>
		<button type="button" id="gd-play-btn">Play</button>
	</div>
	<canvas id="canvas" tabindex="0"></canvas>
	<script src="physix.js"></script>
	<script>
(function () {
	var path = location.pathname;
	var basePath = path ? (location.origin + path.substring(0, path.lastIndexOf('/') + 1)) : '';
	var config = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"physix","experimentalVK":false,"fileSizes":{"physix.pck":0,"physix.wasm":0,"physix.side.wasm":0},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"physix.service.worker.js"};
	if (basePath) {
		var name = (config.executable || 'physix').split('/').pop();
		config.executable = basePath + name;
		config.mainPack = basePath + name + '.pck';
		if (config.fileSizes) {
			config.fileSizes[config.executable + '.wasm'] = config.fileSizes[name + '.wasm'] || config.fileSizes['physix.wasm'] || 0;
			config.fileSizes[config.mainPack] = config.fileSizes[name + '.pck'] || config.fileSizes['physix.pck'] || 0;
			var side = config.fileSizes[name + '.side.wasm'] || config.fileSizes['physix.side.wasm'];
			if (side) {
				config.fileSizes[config.executable + '.side.wasm'] = side;
			}
		}
	}
	var engine = new Engine(config);
	var loading = document.getElementById('gd-loading');
	var progressBar = document.getElementById('gd-progress-bar');
	var loadingText = document.getElementById('gd-loading-text');
	var playBtn = document.getElementById('gd-play-btn');
	var audioPumpTimer = null;
	var loadAllowed = false;

	function isSafariLike() {
		var ua = navigator.userAgent;
		var isIOS = /iPad|iPhone|iPod/.test(ua) ||
			(navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
		var isMacSafari = /Macintosh/.test(ua) &&
			/Version\/[\d.]+/.test(ua) &&
			/Safari\//.test(ua) &&
			!/Chrom(e|ium)|Edg\//.test(ua);
		return isIOS || isMacSafari;
	}

	function detectThreadedBuild(cb) {
		var scriptEl = document.querySelector('script[src*="physix.js"]');
		if (!scriptEl || !scriptEl.src) {
			cb(false);
			return;
		}
		fetch(scriptEl.src)
			.then(function (r) { return r.text(); })
			.then(function (text) {
				cb(text.indexOf('multi-threaded') !== -1);
			})
			.catch(function () { cb(false); });
	}

	function showBlocked(msg) {
		loadAllowed = false;
		playBtn.disabled = true;
		playBtn.style.display = 'none';
		if (loadingText) {
			loadingText.textContent = msg;
		}
		var spinner = loading && loading.querySelector('.spinner');
		if (spinner) {
			spinner.style.display = 'none';
		}
	}

	function checkEnvironment(requiresThreads, done) {
		var missing = Engine.getMissingFeatures({ threads: requiresThreads });
		if (missing.length > 0) {
			showBlocked('Physix cannot run here: ' + missing.join('; ') + '.');
			return;
		}
		if (requiresThreads && isSafariLike()) {
			showBlocked(
				'Safari cannot run this Physix build (threading). Use Chrome or Firefox, or update the site after a new export.'
			);
			return;
		}
		loadAllowed = true;
		playBtn.disabled = false;
		done();
	}

	function wireRuntimeErrors() {
		function onFatal(reason) {
			var msg = reason && reason.message ? reason.message : String(reason || '');
			if (/Out of bounds|blocking on the main thread|pthread/i.test(msg)) {
				showBlocked(
					'Physix hit a browser threading error. Try Chrome or Firefox, or hard-refresh after the site updates.'
				);
			}
		}
		window.addEventListener('error', function (ev) { onFatal(ev.error || ev.message); });
		window.addEventListener('unhandledrejection', function (ev) { onFatal(ev.reason); });
	}

	wireRuntimeErrors();
	playBtn.disabled = true;
	if (loadingText) {
		loadingText.textContent = 'Checking browser...';
	}
	detectThreadedBuild(function (requiresThreads) {
		checkEnvironment(requiresThreads, function () {
			if (loadingText) {
				loadingText.textContent = 'Click to play';
			}
		});
	});

	function pumpAudioResume() {
		try {
			if (window.__resumeAllAudioContexts) {
				window.__resumeAllAudioContexts();
			}
			if (window.physixGodotUnlock) {
				window.physixGodotUnlock();
			}
		} catch (e) {}
	}

	function startAudioPump() {
		if (audioPumpTimer) {
			clearInterval(audioPumpTimer);
		}
		pumpAudioResume();
		audioPumpTimer = setInterval(pumpAudioResume, 350);
		setTimeout(function () {
			if (audioPumpTimer) {
				clearInterval(audioPumpTimer);
				audioPumpTimer = null;
			}
		}, 15000);
	}

	function startGame() {
		playBtn.style.display = 'none';
		loadingText.textContent = 'Loading Physix...';
		engine.startGame({
			onProgress: function (cur, tot) {
				if (tot > 0 && progressBar) {
					progressBar.style.width = (100 * cur / tot) + '%';
				}
			},
		}).then(function () {
			loading.classList.add('hidden');
			pumpAudioResume();
			startAudioPump();
			var canvas = document.getElementById('canvas');
			if (canvas) {
				var onCanvasGesture = function () {
					pumpAudioResume();
				};
				canvas.addEventListener('click', onCanvasGesture, true);
				canvas.addEventListener('touchend', onCanvasGesture, true);
			}
		}).catch(function (err) {
			var msg = err && err.message ? err.message : String(err || '');
			if (/Out of bounds|blocking on the main thread|pthread/i.test(msg)) {
				showBlocked(
					'Physix hit a browser threading error. Try Chrome or Firefox, or hard-refresh after the site updates.'
				);
			} else if (loading) {
				loading.querySelector('.text').textContent = 'Failed to load. Refresh to try again.';
				playBtn.style.display = 'block';
				playBtn.disabled = false;
				loadAllowed = true;
			}
			console.error('Physix startGame failed:', err);
		});
	}

	function onPlayClick() {
		if (!loadAllowed) {
			return;
		}
		pumpAudioResume();
		startAudioPump();
		if (window.AudioContext) {
			try {
				var ctx = new AudioContext();
				if (ctx.state === 'suspended') {
					ctx.resume();
				}
			} catch (e) {}
		}
		function resumeOnNext() {
			document.removeEventListener('click', resumeOnNext, true);
			document.removeEventListener('touchend', resumeOnNext, true);
			document.removeEventListener('keydown', resumeOnNext, true);
			var c = document.getElementById('canvas');
			if (c) {
				c.removeEventListener('click', resumeOnNext, true);
				c.removeEventListener('touchend', resumeOnNext, true);
			}
			pumpAudioResume();
		}
		document.addEventListener('click', resumeOnNext, true);
		document.addEventListener('touchend', resumeOnNext, true);
		document.addEventListener('keydown', resumeOnNext, true);
		var canvas = document.getElementById('canvas');
		if (canvas) {
			canvas.addEventListener('click', resumeOnNext, true);
			canvas.addEventListener('touchend', resumeOnNext, true);
		}
		startGame();
	}

	playBtn.addEventListener('click', onPlayClick);
	playBtn.addEventListener('touchend', function (e) {
		e.preventDefault();
		onPlayClick();
	});
})();
	</script>
</body>
</html>
