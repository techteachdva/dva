<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>Physix</title>
	<!-- Patch AudioContext before Godot loads; resume helper matches Crystal Wizards web build. -->
	<script>(function(){if(typeof window==='undefined'||!window.AudioContext)return;window.__godotAudioContexts=[];var O=window.AudioContext||window.webkitAudioContext;function P(opts){var c=arguments.length?new O(opts):new O();window.__godotAudioContexts.push(c);return c}P.prototype=O.prototype;window.AudioContext=window.webkitAudioContext=P;window.__resumeAllAudioContexts=function(){var a=window.__godotAudioContexts||[];for(var i=0;i<a.length;i++)try{if(a[i]&&typeof a[i].resume==='function'&&a[i].state==='suspended')a[i].resume()}catch(e){}}})();</script>
	<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#physix-play-btn {
	display: none;
	position: relative;
	z-index: 2;
	margin-top: 1rem;
	padding: 0.65rem 1.75rem;
	font-size: 1.1rem;
	font-weight: bold;
	color: #0a0a12;
	background: #7b9cff;
	border: none;
	border-radius: 8px;
	cursor: pointer;
	touch-action: manipulation;
}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="physix.icon.png" />
<link rel="apple-touch-icon" href="physix.apple-touch-icon.png"/>
<link rel="manifest" href="physix.manifest.json">

</head>
<body>
	<canvas id="canvas">
		Your browser does not support the canvas tag.
	</canvas>

	<noscript>
		Your browser does not support JavaScript.
	</noscript>

	<div id="status">
		<img id="status-splash" class="show-image--true fullsize--true use-filter--false" src="physix.png" alt="">
		<progress id="status-progress"></progress>
		<div id="status-notice"></div>
		<button type="button" id="physix-play-btn">Click to play</button>
	</div>

	<script src="physix.js"></script>
	<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"physix","experimentalVK":false,"fileSizes":{"physix.pck":62062144,"physix.wasm":1509558},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"physix.service.worker.js"};
const GODOT_THREADS_ENABLED = true;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const playBtn = document.getElementById('physix-play-btn');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		if (playBtn) {
			playBtn.style.display = mode === 'tap' ? 'block' : 'none';
		}
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		/* Browsers block audio until a user gesture. Defer startGame until click (same idea as Crystal Wizards). */
		let runStarted = false;
		function beginRun() {
			if (runStarted) {
				return;
			}
			runStarted = true;
			try {
				if (typeof window.__resumeAllAudioContexts === 'function') {
					window.__resumeAllAudioContexts();
				}
			} catch (e) {}
			try {
				if (window.AudioContext) {
					const c = new AudioContext();
					if (c.state === 'suspended') {
						c.resume();
					}
				}
			} catch (e) {}
			setStatusMode('progress');
			engine.startGame({
				'onProgress': function (current, total) {
					if (current > 0 && total > 0) {
						statusProgress.value = current;
						statusProgress.max = total;
					} else {
						statusProgress.removeAttribute('value');
						statusProgress.removeAttribute('max');
					}
				},
			}).then(() => {
				setStatusMode('hidden');
				try {
					if (typeof window.__resumeAllAudioContexts === 'function') {
						window.__resumeAllAudioContexts();
					}
				} catch (e) {}
				const canvas = document.getElementById('canvas');
				if (canvas) {
					const once = function () {
						canvas.removeEventListener('click', once, true);
						canvas.removeEventListener('touchend', once, true);
						try {
							if (typeof window.__resumeAllAudioContexts === 'function') {
								window.__resumeAllAudioContexts();
							}
						} catch (e2) {}
					};
					canvas.addEventListener('click', once, true);
					canvas.addEventListener('touchend', once, true);
				}
			}, displayFailureNotice);
		}
		setStatusMode('tap');
		if (playBtn) {
			playBtn.addEventListener('click', beginRun);
			playBtn.addEventListener('touchend', function (e) {
				e.preventDefault();
				beginRun();
			});
		}
	}
}());
	</script>
</body>
</html>
